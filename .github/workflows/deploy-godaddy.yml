name: Deploy to GoDaddy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: godaddy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and FTP deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Lint PHP API
        shell: bash
        run: find api -type f -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: |
          set -euo pipefail
          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

          for attempt in 1 2 3; do
            echo "npm ci attempt ${attempt}/3"
            if npm ci --prefer-offline --no-audit; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 20))
          done

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Prepare deploy package
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          PUBLIC_CATALOG_TOKEN: ${{ secrets.PUBLIC_CATALOG_TOKEN }}
        run: |
          set -euo pipefail
          rm -rf deploy
          mkdir -p deploy
          cp -a web/dist/. deploy/
          cp -a api deploy/api
          rm -f deploy/api/config.example.php

          node <<'NODE'
          const fs = require('fs')

          const required = ['DB_HOST', 'DB_NAME', 'DB_USER', 'DB_PASS', 'APP_SECRET']
          const missing = required.filter((key) => !process.env[key])
          if (missing.length) {
            throw new Error(`Missing required secrets: ${missing.join(', ')}`)
          }

          const phpString = (value) => `'${String(value).replace(/\\/g, '\\\\').replace(/'/g, "\\'")}'`
          const lines = [
            '<?php',
            '/** Auto-generated by GitHub Actions. Do not edit on the server. */',
            'return [',
            `    'DB_HOST' => ${phpString(process.env.DB_HOST)},`,
            `    'DB_NAME' => ${phpString(process.env.DB_NAME)},`,
            `    'DB_USER' => ${phpString(process.env.DB_USER)},`,
            `    'DB_PASS' => ${phpString(process.env.DB_PASS)},`,
            "    'DB_PORT' => 3306,",
            "    'DB_CHARSET' => 'utf8mb4',",
            '',
            `    'APP_SECRET' => ${phpString(process.env.APP_SECRET)},`,
            "    'TOKEN_TTL_HOURS' => 12,",
            "    'COOKIE_NAME' => 'elbakri_token',",
            "    'COOKIE_SECURE' => true,",
            "    'COOKIE_SAMESITE' => 'Lax',",
            '',
            "    'CORS_ALLOWED_ORIGINS' => [],",
            "    'APP_ENV' => 'production',",
            "    'APP_NAME' => 'ELBAKRI Hotel Rate Hub',",
            '',
            "    'WHATSAPP_ENABLED' => false,",
            "    'WHATSAPP_TOKEN' => '',",
            "    'WHATSAPP_PHONE_NUMBER_ID' => '',",
            "    'WHATSAPP_VERIFY_TOKEN' => '',",
            "    'WHATSAPP_WHITELIST' => [],",
            '',
            // Shared-secret gate for the public read-only catalog endpoint
            // (/api/public-catalog) consumed by the elbakri_sharm storefront.
            // Optional: empty disables the endpoint (safe default) until the
            // PUBLIC_CATALOG_TOKEN repo secret is set.
            `    'PUBLIC_CATALOG_TOKEN' => ${phpString(process.env.PUBLIC_CATALOG_TOKEN || '')},`,
            '];',
            '',
          ]
          fs.writeFileSync('deploy/api/config.php', lines.join('\n'))
          NODE

      - name: Deploy by FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
